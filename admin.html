<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admina – Webcrafft</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f; --bg2: #141417; --bg3: #1c1c21;
    --accent: #6c63ff; --text: #e8e8f0; --muted: #888; --border: #2a2a32;
    --green: #2ecc71; --red: #e74c3c; --yellow: #f39c12;
  }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-box {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
    padding: 2.5rem; width: 100%; max-width: 380px; text-align: center;
  }
  .login-box h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: .3rem; }
  .login-box h1 span { color: var(--accent); }
  .login-box p { color: var(--muted); font-size: .9rem; margin-bottom: 2rem; }
  .login-box input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: .75rem 1rem; color: var(--text);
    font-size: .95rem; margin-bottom: 1rem; outline: none; transition: border-color .2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: .85rem; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: background .2s;
  }
  .login-box button:hover { background: #574fd6; }
  .login-error { color: var(--red); font-size: .85rem; margin-top: .75rem; display: none; }

  /* PANEL */
  #panel-screen { display: none; }

  header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo { font-size: 1.2rem; font-weight: 800; }
  .header-logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .header-right span { font-size: .85rem; color: var(--muted); }
  .btn-logout {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: .4rem 1rem; border-radius: 6px; cursor: pointer; font-size: .85rem;
    transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  .panel-body { padding: 2rem; max-width: 1200px; margin: 0 auto; }

  /* STATS */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem; margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.5rem; text-align: center;
  }
  .stat-card .num { font-size: 2.5rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-card .lbl { font-size: .8rem; color: var(--muted); margin-top: .4rem; text-transform: uppercase; letter-spacing: 1px; }

  /* TABS */
  .tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
  .tab-btn {
    background: var(--bg2); border: 1px solid var(--border); color: var(--muted);
    padding: .6rem 1.4rem; border-radius: 8px; cursor: pointer; font-size: .9rem;
    font-weight: 600; transition: all .2s;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* TABLE */
  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--bg3); }
  th { padding: .9rem 1rem; text-align: left; font-size: .78rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  td { padding: .85rem 1rem; font-size: .88rem; border-top: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: rgba(108,99,255,.04); }

  .badge {
    display: inline-block; padding: .2rem .6rem; border-radius: 4px;
    font-size: .75rem; font-weight: 700; text-transform: uppercase;
  }
  .badge-nowe { background: rgba(108,99,255,.15); color: var(--accent); }
  .badge-nowa { background: rgba(108,99,255,.15); color: var(--accent); }
  .badge-wycena { background: rgba(243,156,18,.15); color: var(--yellow); }
  .badge-zrealizowane { background: rgba(46,204,113,.15); color: var(--green); }

  .empty { padding: 3rem; text-align: center; color: var(--muted); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .refresh-btn {
    background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    padding: .5rem 1rem; border-radius: 8px; cursor: pointer; font-size: .85rem;
    transition: all .2s; margin-bottom: 1.5rem;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .loading { padding: 3rem; text-align: center; color: var(--muted); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Web<span>crafft</span></h1>
    <p>Panel administracyjny</p>
    <input type="text" id="login-input" placeholder="Login" />
    <input type="password" id="pass-input" placeholder="Hasło" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()">Zaloguj się</button>
    <div class="login-error" id="login-error">Błędny login lub hasło</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel-screen">
  <header>
    <div class="header-logo">Web<span>crafft</span> Admin</div>
    <div class="header-right">
      <span>Zalogowany: kuba1234</span>
      <button class="btn-logout" onclick="logout()">Wyloguj</button>
    </div>
  </header>

  <div class="panel-body">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="num" id="stat-zamowienia">–</div>
        <div class="lbl">Zamówień</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-wiadomosci">–</div>
        <div class="lbl">Wiadomości</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-nowe">–</div>
        <div class="lbl">Nowych dziś</div>
      </div>
    </div>

    <button class="refresh-btn" onclick="loadData()">↻ Odśwież dane</button>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('zamowienia', this)">🛒 Zamówienia</button>
      <button class="tab-btn" onclick="switchTab('wiadomosci', this)">✉️ Wiadomości</button>
    </div>

    <!-- ZAMOWIENIA -->
    <div class="tab-panel active" id="tab-zamowienia">
      <div class="table-wrap">
        <div class="loading" id="load-zamowienia">Ładowanie...</div>
        <table id="table-zamowienia" style="display:none">
          <thead>
            <tr>
              <th>#</th>
              <th>Data</th>
              <th>Imię</th>
              <th>Email</th>
              <th>Telefon</th>
              <th>Zamówienie</th>
              <th>Uwagi</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="body-zamowienia"></tbody>
        </table>
        <div class="empty" id="empty-zamowienia" style="display:none">Brak zamówień</div>
      </div>
    </div>

    <!-- WIADOMOSCI -->
    <div class="tab-panel" id="tab-wiadomosci">
      <div class="table-wrap">
        <div class="loading" id="load-wiadomosci">Ładowanie...</div>
        <table id="table-wiadomosci" style="display:none">
          <thead>
            <tr>
              <th>#</th>
              <th>Data</th>
              <th>Imię</th>
              <th>Email</th>
              <th>Telefon</th>
              <th>Rodzaj strony</th>
              <th>Wiadomość</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="body-wiadomosci"></tbody>
        </table>
        <div class="empty" id="empty-wiadomosci" style="display:none">Brak wiadomości</div>
      </div>
    </div>
  </div>
</div>

<script>
  const TOKEN_KEY = 'webcrafft_token';

  // Auto-login jeśli token w localStorage
  if (localStorage.getItem(TOKEN_KEY)) showPanel();

  async function doLogin() {
    const login = document.getElementById('login-input').value.trim();
    const pass = document.getElementById('pass-input').value;
    const errEl = document.getElementById('login-error');

    const res = await fetch('/.netlify/functions/admin-auth', {
      method: 'POST',
      body: JSON.stringify({ login, password: pass })
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem(TOKEN_KEY, data.token);
      errEl.style.display = 'none';
      showPanel();
    } else {
      errEl.style.display = 'block';
    }
  }

  function showPanel() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('panel-screen').style.display = 'block';
    loadData();
  }

  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    location.reload();
  }

  async function loadData() {
    const token = localStorage.getItem(TOKEN_KEY);
    const res = await fetch('/.netlify/functions/admin-data', {
      headers: { 'x-admin-token': token }
    });
    if (res.status === 401) { logout(); return; }
    const { zamowienia, wiadomosci } = await res.json();

    renderZamowienia(zamowienia || []);
    renderWiadomosci(wiadomosci || []);

    document.getElementById('stat-zamowienia').textContent = (zamowienia || []).length;
    document.getElementById('stat-wiadomosci').textContent = (wiadomosci || []).length;

    const today = new Date().toISOString().split('T')[0];
    const noweD = [...(zamowienia||[]), ...(wiadomosci||[])].filter(r => r.created_at?.startsWith(today)).length;
    document.getElementById('stat-nowe').textContent = noweD;
  }

  function formatDate(str) {
    if (!str) return '–';
    const d = new Date(str);
    return d.toLocaleDateString('pl-PL') + ' ' + d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
  }

  function renderZamowienia(rows) {
    document.getElementById('load-zamowienia').style.display = 'none';
    if (!rows.length) {
      document.getElementById('empty-zamowienia').style.display = 'block';
      return;
    }
    document.getElementById('table-zamowienia').style.display = 'table';
    document.getElementById('body-zamowienia').innerHTML = rows.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td style="white-space:nowrap">${formatDate(r.created_at)}</td>
        <td>${r.imie || '–'}</td>
        <td><a href="mailto:${r.email}" style="color:var(--accent)">${r.email || '–'}</a></td>
        <td><a href="tel:${r.telefon}" style="color:var(--accent)">${r.telefon || '–'}</a></td>
        <td style="max-width:200px">${r.zamowienie || '–'}</td>
        <td style="max-width:150px;color:var(--muted)">${r.uwagi || '–'}</td>
        <td><span class="badge badge-${r.status}">${r.status}</span></td>
      </tr>
    `).join('');
  }

  function renderWiadomosci(rows) {
    document.getElementById('load-wiadomosci').style.display = 'none';
    if (!rows.length) {
      document.getElementById('empty-wiadomosci').style.display = 'block';
      return;
    }
    document.getElementById('table-wiadomosci').style.display = 'table';
    document.getElementById('body-wiadomosci').innerHTML = rows.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td style="white-space:nowrap">${formatDate(r.created_at)}</td>
        <td>${r.imie || '–'}</td>
        <td><a href="mailto:${r.email}" style="color:var(--accent)">${r.email || '–'}</a></td>
        <td><a href="tel:${r.telefon}" style="color:var(--accent)">${r.telefon || '–'}</a></td>
        <td>${r.rodzaj_strony || '–'}</td>
        <td style="max-width:200px;color:var(--muted)">${r.wiadomosc || '–'}</td>
        <td><span class="badge badge-${r.status}">${r.status}</span></td>
      </tr>
    `).join('');
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }
</script>
</body>
</html>
